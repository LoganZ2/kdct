[server]
bind_addr = "0.0.0.0:2333"
default_token = "test-token-123"
port_pool = "9000-9999"

# Optional. Set to your public hostname (e.g. "app.example.com") to reject
# requests with any other Host header — the same way nginx `server_name`
# works. Leave unset for IP-only setups; the proxy will then accept any
# Host (nginx default_server behavior). TLS requires a domain, so you
# can't enable HTTPS without one.
domain = "localhost"

# Public reverse proxy ports. Only one is used at a time, picked by the TLS
# toggle in the admin panel. http_port is used when TLS is OFF, https_port
# when TLS is ON.
http_port = 8080
https_port = 8443

# Internal port for the panel + REST API. Bound to 127.0.0.1 only. The
# public reverse proxy forwards <domain>/admin/* to this port.
api_port = 9933

# TLS material. Required if you want to enable TLS in the panel toggle.
# tls_cert_path = "/etc/kdct/cert.pem"
# tls_key_path  = "/etc/kdct/key.pem"

# Auto-TLS via ACME (Let's Encrypt). When enabled, kdcts manages cert and key
# itself; tls_cert_path / tls_key_path above are ignored. Requires `domain`,
# and `http_port` must be reachable from the public internet for HTTP-01.
# [server.acme]
# enabled = true
# email   = "you@example.com"
# staging = false                       # use LE staging while testing
# state_dir = "kdct-state/acme/app.example.com"
