# cargo-about configuration.
#
# Lists the SPDX license identifiers we accept from transitive
# dependencies. CI fails the release if a dependency ships under a
# license not on this list — at which point you must either swap the
# dep, get an exception, or add the license here after legal review.
#
# Generous Rust-ecosystem defaults. Notably absent: GPL/AGPL/LGPL
# (copyleft, would force the same on KDCT), and SSPL/Commons Clause
# (server-side copyleft / non-OSS).

accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

# Don't fail on crates that we can't determine a license for —
# warn instead. Tighten to `false` once the audit is clean.
ignore-build-dependencies = false
ignore-dev-dependencies = false
